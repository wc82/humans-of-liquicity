name: Humans of Liquicity Story Publisher

on:
  issues:
    types:
      - opened
      - edited

      workflow_dispatch:

permissions:
  contents: write

jobs:

  create-page:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5


      - name: Generate Humans pages

        env:
  ISSUE_BODY: ${{ github.event.issue.body || '' }}
        run: |

          python3 scripts/generate_humans.py


      - name: Commit pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "Update Humans of Liquicity pages" || echo "No changes"

          git push
