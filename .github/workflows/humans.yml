name: Humans of Liquicity Story Publisher

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write


jobs:

  create-page:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5


      - name: Create person page

        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

        run: |

          mkdir -p people

          python3 <<'PY'

          import os
          import re

          body = os.environ["ISSUE_BODY"]


          def get_field(field):
              match = re.search(
                  rf"### {re.escape(field)}\s*\n\s*(.*)",
                  body
              )
              return match.group(1).strip() if match else ""


          name = get_field("Your Name")
          city = get_field("Your Home City")
          festival = get_field("First Liquicity Festival Attended")
          track = get_field("Track That Made You Love Drum 'n' Bass")
          message = get_field("Your Message To The World")
          image = get_field("Upload Image Link")


          # Convert GitHub markdown image into real URL
          image_match = re.search(
              r'\((https?://[^)]+)\)',
              image
          )

          if image_match:
              image = image_match.group(1)



          slug = re.sub(
              r"[^a-z0-9]+",
              "-",
              name.lower()
          ).strip("-")


          folder = f"people/{slug}"

          os.makedirs(folder, exist_ok=True)


          lines = [
              "<!DOCTYPE html>",
              "<html>",
              "<head>",
              f"<title>{name} - Humans of Liquicity</title>",
              '<link rel="stylesheet" href="../../assets/style.css">',
              '<meta name="viewport" content="width=device-width, initial-scale=1">',
              "</head>",
              "<body>",
              '<div class="profile">',
              f'<img src="{image}" class="profile-image">',
              f"<h1>{name}</h1>",
              f"<h3>📍 {city}</h3>",
              f"<p><strong>First Liquicity Festival:</strong><br>{festival}</p>",
              f"<p><strong>Track that made you love Drum 'n' Bass:</strong><br>{track}</p>",
              f"<blockquote>{message}</blockquote>",
              '<a href="../../">← Back to Humans of Liquicity</a>',
              "</div>",
              "</body>",
              "</html>"
          ]


          with open(
              f"{folder}/index.html",
              "w"
          ) as file:
              file.write("\n".join(lines))


          PY



      - name: Create gallery homepage

        run: |

          python3 <<'PY'

          import glob
          import os
          import re


          cards = []


          for file in glob.glob("people/*/index.html"):

              with open(file) as f:
                  html = f.read()


              folder = os.path.basename(
                  os.path.dirname(file)
              )


              name = re.search(
                  r"<h1>(.*?)</h1>",
                  html
              )


              image = re.search(
                  r'<img src="([^"]+)"',
                  html
              )


              city = re.search(
                  r"📍 (.*?)</h3>",
                  html
              )


              name = name.group(1) if name else folder.title()
              image = image.group(1) if image else ""
              city = city.group(1) if city else ""


              cards.append(
                  f"""
                  <div class="human-card">
                  <a href="people/{folder}/">
                  <img src="{image}" class="human-image">
                  <h2>{name}</h2>
                  <p>📍 {city}</p>
                  <p>Read their story →</p>
                  </a>
                  </div>
                  """
              )



          page = [
              "<!DOCTYPE html>",
              "<html>",
              "<head>",
              "<title>Humans of Liquicity</title>",
              '<link rel="stylesheet" href="assets/style.css">',
              "</head>",
              "<body>",
              "<header>",
              "<h1>🌌 Humans of Liquicity</h1>",
              "<p>The people who make the Liquicity family</p>",
              "</header>",
              '<section class="gallery">',
              "".join(cards),
              "</section>",
              "</body>",
              "</html>"
          ]



          with open("index.html","w") as f:
              f.write("\n".join(page))



          PY



      - name: Commit pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "Update Humans of Liquicity pages" || echo "No changes"

          git push
