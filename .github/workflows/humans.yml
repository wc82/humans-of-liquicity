name: Humans of Liquicity Story Publisher

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write


jobs:

  create-page:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5


      - name: Create person page

        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

        run: |

          mkdir -p people

          python3 <<'PY'

          import os
          import re
          import html


          body = os.environ["ISSUE_BODY"]


          def get_field(field):

              match = re.search(
                  rf"### {re.escape(field)}\s*\n\s*(.*?)(?=\n###|$)",
                  body,
                  re.S
              )

              return match.group(1).strip() if match else ""



          name = get_field("Your Name") or "Anonymous"

          city = get_field("Your Home City")

          image_text = get_field("Upload Image Link")



          image = ""

          image_match = re.search(
              r"https?://[^\s\)\"<>]+",
              image_text
          )

          if image_match:
              image = image_match.group(0)



          slug = re.sub(
              r"[^a-z0-9]+",
              "-",
              name.lower()
          ).strip("-")



          folder = f"people/{slug}"

          counter = 2

          while os.path.exists(folder):

              folder = f"people/{slug}-{counter}"

              counter += 1



          os.makedirs(folder, exist_ok=True)



          reserved = [
              "Your Name",
              "Your Home City",
              "Upload Image Link"
          ]



          sections = re.findall(
              r"### (.*?)\n\n(.*?)(?=\n###|$)",
              body,
              re.S
          )



          story = []


          for question, answer in sections:

              if question in reserved:
                  continue


              question = html.escape(question.strip())

              answer = html.escape(answer.strip())


              story.append(
                  f"""
                  <div class="answer">

                  <h3>{question}</h3>

                  <p>{answer}</p>

                  </div>
                  """
              )



          page = [

              "<!DOCTYPE html>",

              "<html>",

              "<head>",

              f"<title>{html.escape(name)} - Humans of Liquicity</title>",

              '<link rel="stylesheet" href="../../assets/style.css">',

              '<meta name="viewport" content="width=device-width, initial-scale=1">',

              "</head>",


              "<body>",


              '<div class="profile">',


              f'<img src="{image}" class="profile-image">',


              f"<h1>{html.escape(name)}</h1>",


              f"<h3>📍 {html.escape(city)}</h3>",


              "".join(story),


              '<a href="../../">← Back to Humans of Liquicity</a>',


              "</div>",


              "</body>",


              "</html>"

          ]



          with open(
              f"{folder}/index.html",
              "w"
          ) as file:

              file.write("\n".join(page))


          PY





      - name: Create gallery homepage

        run: |

          python3 <<'PY'


          import glob
          import os
          import re


          cards = []



          for file in glob.glob("people/*/index.html"):


              with open(file) as f:
                  page = f.read()



              folder = os.path.basename(
                  os.path.dirname(file)
              )


              name = re.search(
                  r"<h1>(.*?)</h1>",
                  page
              )


              image = re.search(
                  r'<img src="([^"]+)"',
                  page
              )


              city = re.search(
                  r"<h3>📍 (.*?)</h3>",
                  page
              )



              name = name.group(1) if name else folder.title()

              image = image.group(1) if image else ""

              city = city.group(1) if city else ""



              cards.append(
                  f"""
                  <div class="human-card">

                  <a href="people/{folder}/">

                  <img src="{image}" class="human-image">

                  <h2>{name}</h2>

                  <p>📍 {city}</p>

                  <p>Read story →</p>

                  </a>

                  </div>
                  """
              )



          homepage = [

              "<!DOCTYPE html>",

              "<html>",

              "<head>",

              "<title>Humans of Liquicity</title>",

              '<link rel="stylesheet" href="assets/style.css">',

              "</head>",


              "<body>",


              "<header>",

              "<h1>🌌 Humans of Liquicity</h1>",

              "<p>The people who make the Liquicity family</p>",

              "</header>",


              '<section class="gallery">',

              "".join(cards),

              "</section>",


              "</body>",

              "</html>"

          ]



          with open(
              "index.html",
              "w"
          ) as file:

              file.write("\n".join(homepage))


          PY





      - name: Commit pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "Update Humans of Liquicity pages" || echo "No changes"

          git push
