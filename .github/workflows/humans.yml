name: Humans of Liquicity Story Publisher

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: write


jobs:

  create-page:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v5


      - name: Create person page

        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

        run: |

          mkdir -p people

          python3 <<'PY'

          import os
          import re


          body = os.environ["ISSUE_BODY"]


          def get_field(field):

              match = re.search(
                  rf"### {re.escape(field)}\s*\n\s*(.*?)(?=\n###|$)",
                  body,
                  re.S
              )

              return match.group(1).strip() if match else ""



          name = get_field("Your Name")
          city = get_field("Your Home City")
          festival = get_field("First Liquicity Festival Attended")
          track = get_field("Track That Made You Love Drum 'n' Bass")
          message = get_field("Your Message To The World")


          image_section = get_field("Upload Image Link")


          image = ""


          # Handle GitHub markdown image
          image_match = re.search(
              r"https?://[^\s\)\"<>]+",
              image_section
          )


          if image_match:
              image = image_match.group(0)



          if not name:
              name = "Anonymous"



          slug = re.sub(
              r"[^a-z0-9]+",
              "-",
              name.lower()
          ).strip("-")



          folder = f"people/{slug}"


          os.makedirs(
              folder,
              exist_ok=True
          )



          html = [

              "<!DOCTYPE html>",

              "<html>",

              "<head>",

              f"<title>{name} - Humans of Liquicity</title>",

              '<link rel="stylesheet" href="../../assets/style.css">',

              '<meta name="viewport" content="width=device-width, initial-scale=1">',

              "</head>",

              "<body>",

              '<div class="profile">',

              f'<img src="{image}" class="profile-image">',

              f"<h1>{name}</h1>",

              f"<h3>📍 {city}</h3>",

              f"<p><strong>First Liquicity Festival:</strong><br>{festival}</p>",

              f"<p><strong>Track that made you love Drum 'n' Bass:</strong><br>{track}</p>",

              f"<blockquote>{message}</blockquote>",

              '<a href="../../">← Back to Humans of Liquicity</a>',

              "</div>",

              "</body>",

              "</html>"

          ]



          with open(
              f"{folder}/index.html",
              "w"
          ) as file:

              file.write("\n".join(html))


          PY





      - name: Create gallery homepage

        run: |

          python3 <<'PY'


          import glob
          import os
          import re



          cards = []



          for file in glob.glob("people/*/index.html"):


              with open(file) as f:

                  html = f.read()



              folder = os.path.basename(
                  os.path.dirname(file)
              )



              name_match = re.search(
                  r"<h1>(.*?)</h1>",
                  html
              )


              image_match = re.search(
                  r'<img src="([^"]+)"',
                  html
              )


              city_match = re.search(
                  r"<h3>📍 (.*?)</h3>",
                  html
              )



              name = name_match.group(1) if name_match else folder.title()

              image = image_match.group(1) if image_match else ""

              city = city_match.group(1) if city_match else ""



              cards.append(
                  "\n".join([
                      '<div class="human-card">',
                      f'<a href="people/{folder}/">',
                      f'<img src="{image}" class="human-image">',
                      f'<h2>{name}</h2>',
                      f'<p>📍 {city}</p>',
                      '<p>Read their story →</p>',
                      '</a>',
                      '</div>'
                  ])
              )



          homepage = [

              "<!DOCTYPE html>",

              "<html>",

              "<head>",

              "<title>Humans of Liquicity</title>",

              '<link rel="stylesheet" href="assets/style.css">',

              '<meta name="viewport" content="width=device-width, initial-scale=1">',

              "</head>",

              "<body>",

              "<header>",

              "<h1>🌌 Humans of Liquicity</h1>",

              "<p>The people who make the Liquicity family</p>",

              "</header>",

              '<section class="gallery">',

              "".join(cards),

              "</section>",

              "</body>",

              "</html>"

          ]



          with open(
              "index.html",
              "w"
          ) as file:

              file.write("\n".join(homepage))


          PY





      - name: Commit pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git commit -m "Update Humans of Liquicity pages" || echo "No changes"

          git push
