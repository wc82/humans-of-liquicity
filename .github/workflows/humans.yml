        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
    - name: Create page

      run: |

        mkdir -p people

        python3 <<'PY'

        import os, re

        body = os.environ["ISSUE_BODY"]

        def get_field(name):
            match = re.search(
                rf"### {name}\s+(.*)",
                body
            )
            return match.group(1).strip() if match else ""

        name = get_field("Your Name")
        city = get_field("Your Home City")
        festival = get_field("First Liquidity Festival Attended")
        track = get_field("Track That Made You Love Drum 'n' Bass")
        message = get_field("Your Message To The World")
        image = get_field("Upload Image Link")

        slug = re.sub(
            r'[^a-z0-9]+',
            '-',
            name.lower()
        ).strip('-')

        html = f"""
<!DOCTYPE html>
<html>
<head>
<title>{name} - Humans of Liquicity</title>
<link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<div class="card">

<img src="{image}" style="width:100%;border-radius:20px;">

<h1>{name}</h1>

<h3>📍 {city}</h3>

<p><strong>First Liquicity Festival:</strong><br>{festival}</p>

<p><strong>Track that made you love Drum 'n' Bass:</strong><br>{track}</p>

<blockquote>{message}</blockquote>

</div>

</body>
</html>
"""

        open(f"people/{slug}.html","w").write(html)

        PY          
