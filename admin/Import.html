<!DOCTYPE html>
<html>

<head>

<title>Import Humans of Liquicity Interview</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

.container {
    max-width:600px;
    margin:auto;
}

input, textarea {

    width:100%;
    padding:12px;
    margin:10px 0 20px;

    border-radius:10px;
    border:0;

    font-size:16px;

    box-sizing:border-box;

}

button {

    width:100%;
    padding:15px;

    background:#ffcc00;

    border:0;

    border-radius:12px;

    font-size:18px;

    cursor:pointer;

}

.question {

    background:#222;

    padding:15px;

    border-radius:15px;

    margin-bottom:20px;

}

.remove {

    background:#ff4444;

    color:white;

    padding:8px;

    margin-bottom:10px;

}


</style>

</head>


<body>


<div class="container">


<h1>🌌 Humans of Liquicity</h1>

<h2>Import Interview</h2>


<label>
Audio / Video Recording
</label>

<input
type="file"
accept="audio/*,video/*">



<label>
Photo / Image
</label>

<input
type="file"
accept="image/*">



<label>
Name
</label>

<input id="name">



<label>
Home City
</label>

<input id="city">



<h3>Interview Questions</h3>


<div id="questions"></div>


<button onclick="addQuestion()">

+ Add Question

</button>


<br><br>


<label>
Transcript / Notes (optional)
</label>

<textarea
id="notes"
rows="8"
placeholder="Paste raw interview notes here...">
</textarea>



<button onclick="publish()">

🚀 Create Story

</button>



<div id="status"></div>


</div>



<script>


function addQuestion(question="",answer=""){


const div =
document.createElement("div");


div.className="question";


div.innerHTML = `

<button class="remove" onclick="this.parentElement.remove()">
Remove
</button>


<label>
Question
</label>

<input class="q" value="${question}">


<label>
Answer
</label>

<textarea class="a">${answer}</textarea>

`;


document
.getElementById("questions")
.appendChild(div);


}




// start with one question

addQuestion();





async function publish(){


let token =
localStorage.getItem(
"github_token"
);



if(!token){


token =
prompt(
"Enter GitHub token"
);


if(!token){

return;

}


localStorage.setItem(
"github_token",
token
);


}



const name =
document
.getElementById("name")
.value;



const city =
document
.getElementById("city")
.value;



let body =

`### Your Name

${name}


### Your Home City

${city}

`;





document
.querySelectorAll(".question")
.forEach(q=>{


const question =
q.querySelector(".q").value;


const answer =
q.querySelector(".a").value;



if(question.trim()){


body +=

`

### ${question}

${answer}

`;

}


});




const notes =
document
.getElementById("notes")
.value;



if(notes.trim()){


body +=

`

### Additional Notes

${notes}

`;

}



body +=

`

### Upload Image Link


`;





document
.getElementById("status")
.innerHTML =
"Creating story... 🚀";




const response =
await fetch(

"https://api.github.com/repos/wc82/humans-of-liquicity/issues",

{

method:"POST",

headers:{

"Authorization":
"Bearer "+token,

"Accept":
"application/vnd.github+json"

},

body:JSON.stringify({

title:name,

body:body,

labels:[

"human-story"

]

})

}

);




if(response.ok){


document
.getElementById("status")
.innerHTML =
"Story created 🎉";


}

else {


alert(
await response.text()
);


}


}


</script>


</body>

</html>
