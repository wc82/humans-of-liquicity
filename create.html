<!DOCTYPE html>
<html>

<head>

<title>Create Humans of Liquicity Story</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

.container {
    max-width:600px;
    margin:auto;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0 20px 0;
    border-radius:10px;
    border:0;
    font-size:16px;
}

button {

    width:100%;
    padding:15px;
    border-radius:12px;
    border:0;
    font-size:18px;
    background:#ffcc00;
    cursor:pointer;

}


.question {

    background:#222;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;

}


img {

    width:100%;
    border-radius:20px;
    margin-bottom:20px;

}

</style>

</head>


<body>


<div class="container">


<h1>🌌 Humans of Liquicity</h1>

<h2>Create Story</h2>


<label>Photo</label>

<input
type="file"
id="photo"
accept="image/*,.jpg,.jpeg,.png,.heic">


<img id="preview" style="display:none;">



<label>Name</label>

<input id="name">



<label>Home City</label>

<input id="city">

<label>Interview Template</label>

<select id="template" onchange="loadTemplate()">

<option value="standard">
🌌 Standard Festival Interview
</option>

<option value="artist">
🎤 Artist Interview
</option>

<option value="crew">
🤝 Crew Interview
</option>

<option value="volunteer">
🙌 Volunteer Interview
</option>

<option value="blank">
⬜ Blank Interview
</option>

</select>

<div id="questions"></div>

<button onclick="addQuestion()">
+ Add Question
</button>

<br><br>

<button onclick="saveDraft()">
💾 Save Draft
</button>

<br><br>

<button onclick="publish()">
🚀 Publish Story
</button>


<div id="status"></div>


</div>


<script>

    const CLOUD_NAME = "fpktjto6";

const UPLOAD_PRESET = "humans";

const CLOUD_FOLDER = "humans-of-liquicity";


const templates = {

standard: [
"Tell us a little about yourself.",
"Where are you from?",
"When did you first discover Liquicity?",
"What made you fall in love with the community?",
"What has been your favourite Liquicity memory?",
"Which artist has had the biggest impact on you?",
"What does Liquicity mean to you?",
"Is there anything else you'd like to share?"
],


artist: [
"Tell us about yourself.",
"How did your musical journey begin?",
"When did you first become involved with Liquicity?",
"What does playing Liquicity mean to you?",
"Which track are you most proud of?",
"What inspires your music?",
"What would you like to say to the Liquicity community?"
],


crew: [
"Tell us about yourself.",
"What is your role within Liquicity?",
"How long have you been part of the team?",
"What happens behind the scenes that people don't see?",
"What has been your favourite moment working with Liquicity?",
"What makes the community special?"
],


volunteer: [
"Tell us about yourself.",
"How did you get involved with Liquicity?",
"What is your favourite part of volunteering?",
"What is your favourite festival memory?",
"Why do you keep coming back?"
],


blank: []

};



function loadTemplate(){

const selected =
document.getElementById("template").value;


const questions =
document.getElementById("questions");


questions.innerHTML="";


templates[selected].forEach(q=>{

addQuestion(q);

});

}





function addQuestion(questionText=""){

let div=document.createElement("div");

div.className="question";


div.innerHTML=`

<button
type="button"
class="remove-question"
onclick="removeQuestion(this)">
🗑 Remove
</button>

<label>Question</label>

<input class="q" value="${questionText}">

<label>Answer</label>

<textarea class="a"></textarea>

`;


document
.getElementById("questions")
.appendChild(div);

updateRemoveButtons();

}



function removeQuestion(button){

button.parentElement.remove();

updateRemoveButtons();

}



function updateRemoveButtons(){

const buttons =
document.querySelectorAll(".remove-question");

buttons.forEach(btn=>btn.style.display="inline-block");

if(buttons.length===1){

buttons[0].style.display="none";

}

}

window.onload=function(){

loadTemplate();

restoreDraft();

};

// --------------------------
// Photo preview
// --------------------------

document
.getElementById("photo")
.addEventListener(
"change",
function(e){

const file=e.target.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(){

const img =
document.getElementById("preview");

img.src=reader.result;

img.style.display="block";

}

reader.readAsDataURL(file);

}

});




// --------------------------
// Cloudinary upload
// --------------------------

async function uploadImage(){


const file =
document
.getElementById("photo")
.files[0];


if(!file){

return "";

}



document
.getElementById("status")
.innerHTML =
"Uploading photo... ☁️";



const formData =
new FormData();


formData.append(
"file",
file
);


formData.append(
"upload_preset",
UPLOAD_PRESET
);


formData.append(
"folder",
CLOUD_FOLDER
);



const response =
await fetch(

"https://api.cloudinary.com/v1_1/"
+
CLOUD_NAME
+
"/image/upload",

{

method:"POST",

body:formData

}

);



const data =
await response.json();



if(!data.secure_url){

throw new Error(
"Cloudinary upload failed"
);

}


return data.secure_url;


}






// --------------------------
// Save draft
// --------------------------

function saveDraft(){


const draft = {


name:
document.getElementById("name").value,


city:
document.getElementById("city").value,


template:
document.getElementById("template").value,


questions:
[...document.querySelectorAll(".question")]
.map(q=>({

question:
q.querySelector(".q").value,


answer:
q.querySelector(".a").value

}))


};



localStorage.setItem(
"liquicity_draft",
JSON.stringify(draft)
);


document
.getElementById("status")
.innerHTML =
"Draft saved 💾";


}






// --------------------------
// Restore draft
// --------------------------

function restoreDraft(){


const saved =
localStorage.getItem(
"liquicity_draft"
);


if(!saved){

return;

}


const draft =
JSON.parse(saved);



document
.getElementById("name")
.value =
draft.name || "";



document
.getElementById("city")
.value =
draft.city || "";



document
.getElementById("template")
.value =
draft.template || "standard";



loadTemplate();



const boxes =
document.querySelectorAll(".question");



draft.questions.forEach((q,i)=>{


if(boxes[i]){

boxes[i]
.querySelector(".a")
.value =
q.answer;

}

});


}

// --------------------------
// Publish Story to GitHub
// --------------------------

async function publish(){


try {


const imageURL =
await uploadImage();



let githubToken =
localStorage.getItem(
"github_token"
);



if(!githubToken){


githubToken =
prompt(
"Enter GitHub token"
);


if(!githubToken){

return;

}


localStorage.setItem(
"github_token",
githubToken
);


}




const name =
document
.getElementById("name")
.value;


const city =
document
.getElementById("city")
.value;




let body =

`### Your Name

${name}

### Your Home City

${city}

`;





document
.querySelectorAll(".question")
.forEach(q=>{


const question =
q.querySelector(".q").value;


const answer =
q.querySelector(".a").value;



if(question.trim()){


body +=

`

### ${question}

${answer}

`;

}


});





body +=

`

### Upload Image Link

${imageURL}

`;





document
.getElementById("status")
.innerHTML =
"Publishing story... 🚀";






const response =
await fetch(

"https://api.github.com/repos/wc82/humans-of-liquicity/issues",

{

method:"POST",

headers:{

"Authorization":
"Bearer " + githubToken,

"Accept":
"application/vnd.github+json"

},


body:JSON.stringify({

title:name,

body:body,

labels:[

"human-story"

]

})


}

);





if(response.ok){


document
.getElementById("status")
.innerHTML =
"Story published successfully 🎉";


localStorage.removeItem(
"liquicity_draft"
);


}

else {


const error =
await response.text();


alert(
"GitHub error:\n"
+
error
);


}



}


catch(error){


alert(
"Error:\n"
+
error.message
);


}


}

</script>


</body>

</html>
